  { sec:"LLP-25", title:"Winding Up and Dissolution of LLP", ch:"Other Laws · LLP Act 2008", freq:2, cx:"Med", roi:"Med", note:"Voluntary vs tribunal winding up, grounds — moderately tested." },
];

let currentTab = 'corporate';
let openCard = null;

function getFreqKey(f) { return Math.min(Math.max(f,0),4); }

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  openCard = null;
  populateChFilter();
  render();
}

function populateChFilter() {
  const data = currentTab === 'corporate' ? corporate : other;
  const sel = document.getElementById('chFilter');
  const chapters = ['all', ...Array.from(new Set(data.map(s => s.ch)))];
  sel.innerHTML = chapters.map(c => `<option value="${c}">${c === 'all' ? 'All Chapters' : c}</option>`).join('');
}

function render() {
  const data = currentTab === 'corporate' ? corporate : other;
  const search = document.getElementById('search').value.toLowerCase();
  const freqVal = document.getElementById('freqFilter').value;
  const chVal = document.getElementById('chFilter').value;

  let sorted = [...data].sort((a,b) => b.freq - a.freq);

  let filtered = sorted.filter(s => {
    const fk = getFreqKey(s.freq);
    const fOk = freqVal === 'all' || String(fk) === freqVal;
    const cOk = chVal === 'all' || s.ch === chVal;
    const sOk = !search || s.title.toLowerCase().includes(search) || String(s.sec).toLowerCase().includes(search);
    return fOk && cOk && sOk;
  });

  document.getElementById('count').textContent = `Showing ${filtered.length} of ${data.length} sections · sorted by frequency`;

  const list = document.getElementById('card-list');
  list.innerHTML = filtered.map((s, i) => {
    const fk = getFreqKey(s.freq);
    const fc = FREQ[fk];
    const isOpen = openCard === `${s.sec}-${currentTab}`;

    const cxTag = s.cx ? `<span class="tag cx-${s.cx}">${s.cx}</span>` : '';
    const roiTag = s.roi ? `<span class="tag roi-${s.roi}">${s.roi} ROI</span>` : '';
    const freqTag = `<span class="freq-tag" style="color:${fc.color};border-color:${fc.color};background:${fc.bg}22">${fc.label}</span>`;

    return `
      <div class="card" id="card-${s.sec}-${currentTab}"
        style="background:#1a1a1a;border-color:${fc.border}33;border-left-color:${fc.color}"
        onclick="toggleCard('${s.sec}')">
        <div class="card-row">
          <span class="card-rank">#${i+1}</span>
          <span class="sec-badge" style="background:${fc.bg};color:${fc.color}">Sec ${s.sec}</span>
          <span class="card-title">${s.title}</span>
          <div class="tags">${cxTag}${roiTag}${freqTag}</div>
          <span class="arrow">${isOpen ? '▲' : '▼'}</span>
        </div>
        <div class="card-detail ${isOpen ? 'open' : ''}">
          <div class="detail-ch">${s.ch}</div>
          <div class="detail-note">${s.note}</div>
        </div>
      </div>`;
  }).join('');
}

function toggleCard(sec) {
  const key = `${sec}-${currentTab}`;
  openCard = openCard === key ? null : key;
  render();
  if (openCard) {
    setTimeout(() => {
      const el = document.getElementById(`card-${sec}-${currentTab}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }
}

// Init
populateChFilter();
render();
</script>
</body>
</html>
